<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>المتجر</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<style>
/* ===== THEMES ===== */
:root {
  --bg: #0a0a0f;
  --bg2: #13131a;
  --bg3: #1a1a24;
  --accent: #D4AF37;
  --accent2: #f0d060;
  --text: #f0ede8;
  --text2: #a09a8e;
  --card: rgba(255,255,255,0.04);
  --border: rgba(212,175,55,0.18);
  --shadow: rgba(212,175,55,0.12);
  --badge: #D4AF37;
  --badge-text: #0a0a0f;
  --btn: linear-gradient(135deg,#D4AF37,#f0d060);
  --btn-text: #0a0a0f;
  --nav-bg: rgba(10,10,15,0.92);
  --glass: rgba(255,255,255,0.04);
  --radius: 16px;
}
[data-theme="emerald"] {
  --bg: #f4faf5; --bg2: #e8f5eb; --bg3: #fff;
  --accent: #1a7a3c; --accent2: #2ecc71;
  --text: #0d2b18; --text2: #4a7a5a;
  --card: #fff; --border: rgba(26,122,60,0.15);
  --shadow: rgba(26,122,60,0.1);
  --badge: #1a7a3c; --badge-text: #fff;
  --btn: linear-gradient(135deg,#1a7a3c,#2ecc71);
  --btn-text: #fff; --nav-bg: rgba(244,250,245,0.95);
  --glass: rgba(26,122,60,0.04);
}
[data-theme="ocean"] {
  --bg: #040d1a; --bg2: #071528; --bg3: #0a1e36;
  --accent: #00b4d8; --accent2: #90e0ef;
  --text: #e0f4ff; --text2: #7ab8d4;
  --card: rgba(0,180,216,0.06); --border: rgba(0,180,216,0.2);
  --shadow: rgba(0,180,216,0.12);
  --badge: #00b4d8; --badge-text: #040d1a;
  --btn: linear-gradient(135deg,#00b4d8,#90e0ef);
  --btn-text: #040d1a; --nav-bg: rgba(4,13,26,0.94);
  --glass: rgba(0,180,216,0.05);
}
[data-theme="rose"] {
  --bg: #fff5f7; --bg2: #ffe8ed; --bg3: #fff;
  --accent: #c0395a; --accent2: #e8748e;
  --text: #2d0a12; --text2: #8a4455;
  --card: #fff; --border: rgba(192,57,90,0.15);
  --shadow: rgba(192,57,90,0.1);
  --badge: #c0395a; --badge-text: #fff;
  --btn: linear-gradient(135deg,#c0395a,#e8748e);
  --btn-text: #fff; --nav-bg: rgba(255,245,247,0.95);
  --glass: rgba(192,57,90,0.04);
}
[data-theme="slate"] {
  --bg: #f8f9fb; --bg2: #eef0f4; --bg3: #fff;
  --accent: #3b4f6e; --accent2: #5b7ba8;
  --text: #1a2030; --text2: #6a7a90;
  --card: #fff; --border: rgba(59,79,110,0.14);
  --shadow: rgba(59,79,110,0.08);
  --badge: #3b4f6e; --badge-text: #fff;
  --btn: linear-gradient(135deg,#3b4f6e,#5b7ba8);
  --btn-text: #fff; --nav-bg: rgba(248,249,251,0.96);
  --glass: rgba(59,79,110,0.04);
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Cairo',sans-serif;
  min-height:100vh;
  transition:background .4s,color .4s;
}

/* NAV */
nav{
  position:fixed;top:0;width:100%;z-index:100;
  background:var(--nav-bg);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:0 5%;height:68px;
  display:flex;align-items:center;justify-content:space-between;
}
.nav-logo{
  font-size:1.4rem;font-weight:900;
  background:var(--btn);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:1px;
}
.nav-links{display:flex;gap:28px;list-style:none;}
.nav-links a{
  color:var(--text2);text-decoration:none;font-size:.92rem;font-weight:600;
  transition:color .2s;
}
.nav-links a:hover{color:var(--accent);}
.nav-right{display:flex;align-items:center;gap:14px;}

/* THEME SWITCHER */
.theme-btn{
  background:var(--glass);border:1px solid var(--border);
  border-radius:50px;padding:6px 14px;
  color:var(--text2);font-family:'Cairo',sans-serif;
  font-size:.82rem;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;gap:6px;
}
.theme-btn:hover{border-color:var(--accent);color:var(--accent);}
.theme-palette{
  position:absolute;top:74px;left:5%;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;
  display:none;flex-wrap:wrap;gap:10px;width:220px;
  box-shadow:0 12px 40px var(--shadow);z-index:200;
}
.theme-palette.open{display:flex;}
.theme-dot{
  width:36px;height:36px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:all .2s;
  position:relative;
}
.theme-dot:hover,.theme-dot.active{border-color:var(--text);transform:scale(1.15);}
.theme-dot[data-t="gold"]{background:linear-gradient(135deg,#D4AF37,#f0d060);}
.theme-dot[data-t="emerald"]{background:linear-gradient(135deg,#1a7a3c,#2ecc71);}
.theme-dot[data-t="ocean"]{background:linear-gradient(135deg,#00b4d8,#90e0ef);}
.theme-dot[data-t="rose"]{background:linear-gradient(135deg,#c0395a,#e8748e);}
.theme-dot[data-t="slate"]{background:linear-gradient(135deg,#3b4f6e,#5b7ba8);}

/* LANG TOGGLE */
.lang-btn{
  background:var(--glass);border:1px solid var(--border);
  border-radius:50px;padding:6px 16px;
  color:var(--accent);font-weight:700;font-size:.85rem;
  cursor:pointer;transition:all .2s;font-family:'Cairo',sans-serif;
}
.lang-btn:hover{background:var(--accent);color:var(--btn-text);}

/* CART ICON */
.cart-icon{
  position:relative;cursor:pointer;
  background:var(--glass);border:1px solid var(--border);
  border-radius:50%;width:40px;height:40px;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.cart-icon:hover{border-color:var(--accent);}
.cart-icon svg{width:20px;height:20px;stroke:var(--text2);}
.cart-count{
  position:absolute;top:-4px;right:-4px;
  background:var(--accent);color:var(--btn-text);
  border-radius:50%;width:18px;height:18px;
  font-size:.65rem;font-weight:900;
  display:flex;align-items:center;justify-content:center;
}

/* HERO */
.hero{
  margin-top:68px;
  min-height:480px;
  background:var(--bg2);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  border-bottom:1px solid var(--border);
}
.hero-glow{
  position:absolute;
  width:600px;height:600px;
  border-radius:50%;
  background:radial-gradient(circle,var(--accent) 0%,transparent 70%);
  opacity:.06;
  top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;
}
.hero-content{text-align:center;padding:60px 5%;position:relative;z-index:1;}
.hero-content h1{
  font-size:clamp(2rem,5vw,3.5rem);
  font-weight:900;line-height:1.2;
  margin-bottom:16px;
}
.hero-content h1 span{
  background:var(--btn);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.hero-content p{
  color:var(--text2);font-size:1.05rem;max-width:500px;margin:0 auto 28px;
}
.hero-cta{
  display:inline-block;
  background:var(--btn);color:var(--btn-text);
  padding:14px 36px;border-radius:50px;
  font-weight:700;font-size:1rem;
  text-decoration:none;cursor:pointer;
  transition:transform .2s,box-shadow .2s;
  border:none;font-family:'Cairo',sans-serif;
}
.hero-cta:hover{transform:translateY(-2px);box-shadow:0 8px 30px var(--shadow);}

/* SEARCH */
.search-bar{
  padding:32px 5% 0;
  max-width:600px;margin:0 auto;
}
.search-wrap{
  position:relative;
}
.search-wrap input{
  width:100%;padding:14px 50px 14px 20px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:50px;color:var(--text);
  font-family:'Cairo',sans-serif;font-size:.95rem;
  outline:none;transition:border-color .2s;
}
.search-wrap input:focus{border-color:var(--accent);}
.search-wrap input::placeholder{color:var(--text2);}
.search-wrap svg{
  position:absolute;top:50%;right:18px;transform:translateY(-50%);
  width:20px;height:20px;stroke:var(--text2);pointer-events:none;
}

/* CATEGORIES */
.cats{
  padding:28px 5%;
  display:flex;gap:10px;flex-wrap:wrap;justify-content:center;
}
.cat-btn{
  padding:8px 22px;border-radius:50px;
  border:1px solid var(--border);
  background:transparent;color:var(--text2);
  font-family:'Cairo',sans-serif;font-size:.88rem;font-weight:600;
  cursor:pointer;transition:all .2s;
}
.cat-btn:hover,.cat-btn.active{
  background:var(--accent);color:var(--btn-text);border-color:var(--accent);
}

/* SECTION TITLE */
.section-title{
  padding:8px 5% 24px;
  font-size:1.4rem;font-weight:900;
  display:flex;align-items:center;gap:12px;
}
.section-title::after{
  content:'';flex:1;height:1px;background:var(--border);
}

/* PRODUCTS GRID */
.products-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:20px;padding:0 5% 60px;
}
.product-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
  transition:transform .25s,box-shadow .25s,border-color .25s;
  cursor:pointer;position:relative;
}
.product-card:hover{
  transform:translateY(-5px);
  box-shadow:0 16px 48px var(--shadow);
  border-color:var(--accent);
}
.product-img{
  width:100%;aspect-ratio:1;object-fit:cover;
  background:var(--bg2);display:block;
}
.product-img-placeholder{
  width:100%;aspect-ratio:1;
  background:var(--bg2);
  display:flex;align-items:center;justify-content:center;
}
.product-img-placeholder svg{width:48px;height:48px;stroke:var(--text2);opacity:.4;}
.product-info{padding:16px;}
.product-badge{
  display:inline-block;
  background:var(--badge);color:var(--badge-text);
  font-size:.7rem;font-weight:700;padding:3px 10px;
  border-radius:50px;margin-bottom:8px;
}
.product-name{
  font-size:1rem;font-weight:700;margin-bottom:6px;
  line-height:1.3;
}
.product-desc{
  color:var(--text2);font-size:.82rem;margin-bottom:12px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.product-price{
  font-size:1.2rem;font-weight:900;color:var(--accent);
}
.product-price-old{
  color:var(--text2);font-size:.82rem;text-decoration:line-through;margin-right:6px;
}
.product-actions{
  padding:0 16px 16px;display:flex;gap:8px;
}
.btn-cart{
  flex:1;padding:10px;border-radius:10px;
  background:var(--btn);color:var(--btn-text);
  border:none;font-family:'Cairo',sans-serif;font-weight:700;
  font-size:.88rem;cursor:pointer;transition:opacity .2s;
}
.btn-cart:hover{opacity:.88;}
.btn-wish{
  width:40px;height:40px;border-radius:10px;
  background:var(--glass);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;
}
.btn-wish:hover{border-color:var(--accent);}
.btn-wish svg{width:18px;height:18px;stroke:var(--text2);}
.btn-wish.liked svg{stroke:#e74c3c;fill:#e74c3c;}

/* EMPTY */
.empty{
  text-align:center;padding:80px 5%;color:var(--text2);
  grid-column:1/-1;
}
.empty svg{width:64px;height:64px;stroke:var(--text2);opacity:.3;margin-bottom:16px;}
.empty p{font-size:1.1rem;}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  backdrop-filter:blur(8px);z-index:500;
  display:flex;align-items:center;justify-content:center;
  padding:20px;opacity:0;pointer-events:none;transition:opacity .3s;
}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:24px;max-width:520px;width:100%;
  max-height:90vh;overflow-y:auto;
  transform:translateY(20px);transition:transform .3s;
}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:24px 24px 0 0;}
.modal-body{padding:24px;}
.modal-close{
  position:absolute;top:16px;left:16px;
  width:36px;height:36px;border-radius:50%;
  background:rgba(0,0,0,.5);border:none;
  color:#fff;font-size:1.2rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.modal-name{font-size:1.4rem;font-weight:900;margin-bottom:8px;}
.modal-desc{color:var(--text2);margin-bottom:16px;line-height:1.7;}
.modal-price-row{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.modal-price{font-size:1.6rem;font-weight:900;color:var(--accent);}
.modal-old{color:var(--text2);font-size:1rem;text-decoration:line-through;}
.modal-add{
  width:100%;padding:14px;border-radius:12px;
  background:var(--btn);color:var(--btn-text);
  border:none;font-family:'Cairo',sans-serif;font-weight:700;
  font-size:1rem;cursor:pointer;
}

/* CART DRAWER */
.cart-drawer{
  position:fixed;top:0;right:-100%;width:360px;max-width:95vw;height:100%;
  background:var(--bg3);border-left:1px solid var(--border);
  z-index:600;transition:right .35s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
}
.cart-drawer.open{right:0;}
.cart-header{
  padding:24px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.cart-header h3{font-size:1.1rem;font-weight:900;}
.cart-close{
  background:none;border:none;color:var(--text2);font-size:1.4rem;
  cursor:pointer;
}
.cart-items{flex:1;overflow-y:auto;padding:16px;}
.cart-item{
  display:flex;gap:12px;padding:12px 0;
  border-bottom:1px solid var(--border);
}
.cart-item img{width:60px;height:60px;object-fit:cover;border-radius:10px;background:var(--bg2);}
.cart-item-info{flex:1;}
.cart-item-name{font-weight:700;font-size:.9rem;margin-bottom:4px;}
.cart-item-price{color:var(--accent);font-weight:700;font-size:.95rem;}
.cart-item-qty{
  display:flex;align-items:center;gap:8px;margin-top:6px;
}
.qty-btn{
  width:26px;height:26px;border-radius:6px;
  background:var(--glass);border:1px solid var(--border);
  color:var(--text);cursor:pointer;font-size:.9rem;
  display:flex;align-items:center;justify-content:center;
}
.cart-footer{
  padding:20px;border-top:1px solid var(--border);
}
.cart-total{
  display:flex;justify-content:space-between;
  font-weight:700;font-size:1.1rem;margin-bottom:16px;
}
.cart-total span:last-child{color:var(--accent);}
.checkout-btn{
  width:100%;padding:14px;border-radius:12px;
  background:var(--btn);color:var(--btn-text);
  border:none;font-family:'Cairo',sans-serif;font-weight:700;
  font-size:1rem;cursor:pointer;
}
.wa-btn{
  width:100%;padding:12px;border-radius:12px;
  background:transparent;border:1px solid var(--border);
  color:var(--text2);font-family:'Cairo',sans-serif;font-weight:600;
  font-size:.9rem;cursor:pointer;margin-top:10px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.wa-btn:hover{border-color:#25d366;color:#25d366;}

/* TOAST */
.toast{
  position:fixed;bottom:30px;right:30px;
  background:var(--accent);color:var(--btn-text);
  padding:12px 24px;border-radius:50px;
  font-weight:700;font-size:.9rem;z-index:999;
  transform:translateY(80px);opacity:0;
  transition:all .3s;pointer-events:none;
}
.toast.show{transform:translateY(0);opacity:1;}

/* FOOTER */
footer{
  background:var(--bg2);border-top:1px solid var(--border);
  text-align:center;padding:32px 5%;color:var(--text2);
  font-size:.88rem;
}
footer span{color:var(--accent);font-weight:700;}

/* MOBILE */
@media(max-width:680px){
  .nav-links{display:none;}
  .products-grid{grid-template-columns:repeat(2,1fr);gap:12px;}
  .hero-content h1{font-size:1.8rem;}
}
</style>
</head>

      <div class="modal-name" id="modalName"></div>
      <div class="modal-desc" id="modalDesc"></div>
      <div class="modal-price-row">
        <span class="modal-price" id="modalPrice"></span>
        <span class="modal-old" id="modalOld"></span>
      </div>
      <button class="modal-add" id="modalAddCart" data-ar="أضف إلى السلة" data-en="Add to Cart">أضف إلى السلة</button>
    </div>
  </div>
</div>

<!-- CART DRAWER -->
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-header">
    <h3 data-ar="سلة التسوق" data-en="Shopping Cart">سلة التسوق</h3>
    <button class="cart-close" id="cartClose">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer">
    <div class="cart-total">
      <span data-ar="المجموع" data-en="Total">المجموع</span>
      <span id="cartTotal">0</span>
    </div>
    <button class="checkout-btn" data-ar="إتمام الشراء" data-en="Checkout">إتمام الشراء</button>
    <button class="wa-btn" id="waCheckout">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      <span data-ar="طلب عبر واتساب" data-en="Order via WhatsApp">طلب عبر واتساب</span>
    </button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- FOOTER -->
<footer id="contact">
  <p>© 2025 <span id="footerName">STORE</span> — <span data-ar="جميع الحقوق محفوظة" data-en="All Rights Reserved">جميع الحقوق محفوظة</span></p>
  <p style="margin-top:8px;" data-ar="مدعوم بـ NJSERVICES" data-en="Powered by NJSERVICES">مدعوم بـ NJSERVICES</p>
</footer>

<script>
// ===== CONFIG =====
const SUPABASE_URL = 'https://pvxgacpgqqdrfiidpmhz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Eshtee3MlIfxrVNtAnWIeQ_MMBWe_4e';
const WA_NUMBER   = '212703652247';

// ===== STATE =====
let allProducts = [];
let cart = JSON.parse(localStorage.getItem('nj_cart')||'[]');
let currentLang = 'ar';
let currentProduct = null;
let currentCat = 'all';

// ===== SUPABASE FETCH =====
async function loadProducts() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/products?select=*&order=created_at.desc`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      }
    });
    allProducts = await res.json();
    renderCategories();
    renderProducts();
  } catch(e) {
    document.getElementById('productsGrid').innerHTML = `
      <div class="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <p>${currentLang==='ar'?'تعذر تحميل المنتجات':'Could not load products'}</p>
      </div>`;
  }
}

// ===== RENDER CATEGORIES =====
function renderCategories() {
  const cats = [...new Set(allProducts.map(p=>p.category).filter(Boolean))];
  const container = document.getElementById('catsContainer');
  container.innerHTML = `<button class="cat-btn ${currentCat==='all'?'active':''}" data-cat="all">${currentLang==='ar'?'الكل':'All'}</button>`;
  cats.forEach(c=>{
    const btn = document.createElement('button');
    btn.className = `cat-btn ${currentCat===c?'active':''}`;
    btn.dataset.cat = c;
    btn.textContent = c;
    container.appendChild(btn);
  });
  container.querySelectorAll('.cat-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{ currentCat=btn.dataset.cat; renderCategories(); renderProducts(); });
  });
}

// ===== RENDER PRODUCTS =====
function renderProducts(query='') {
  const grid = document.getElementById('productsGrid');
  let filtered = allProducts;
  if(currentCat!=='all') filtered = filtered.filter(p=>p.category===currentCat);
  if(query) filtered = filtered.filter(p=>(p.name||'').toLowerCase().includes(query)||((p.name_en||'').toLowerCase().includes(query)));

  if(!filtered.length){
    grid.innerHTML=`<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <p>${currentLang==='ar'?'لا توجد منتجات':'No products found'}</p></div>`;
    return;
  }
  grid.innerHTML = filtered.map(p=>productCard(p)).join('');
  grid.querySelectorAll('.product-card').forEach((card,i)=>{
    card.addEventListener('click',e=>{
      if(e.target.closest('.btn-cart')||e.target.closest('.btn-wish')) return;
      openModal(filtered[i]);
    });
    card.querySelector('.btn-cart').addEventListener('click',e=>{ e.stopPropagation(); addToCart(filtered[i]); });
    card.querySelector('.btn-wish').addEventListener('click',e=>{ e.stopPropagation(); toggleWish(e.currentTarget); });
  });
}

function productCard(p){
  const name  = currentLang==='ar' ? (p.name||'') : (p.name_en||p.name||'');
  const desc  = currentLang==='ar' ? (p.description||'') : (p.description_en||p.description||'');
  const price = p.price;
  const old   = p.old_price;
  const img   = p.image_url;
  const disc  = old ? Math.round((1-price/old)*100)+'%' : '';
  return `
  <div class="product-card">
    ${img ? `<img class="product-img" src="${img}" alt="${name}" loading="lazy"/>` : `<div class="product-img-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`}
    <div class="product-info">
      ${disc?`<span class="product-badge">${disc} ${currentLang==='ar'?'خصم':'OFF'}</span>`:''}
      ${p.category?`<span class="product-badge" style="margin-right:6px;background:var(--glass);color:var(--text2);border:1px solid var(--border)">${p.category}</span>`:''}
      <div class="product-name">${name}</div>
      <div class="product-desc">${desc}</div>
      <div>
        ${old?`<span class="product-price-old">${old} ${p.currency||'MAD'}</span>`:''}
        <span class="product-price">${price} ${p.currency||'MAD'}</span>
      </div>
    </div>
    <div class="product-actions">
      <button class="btn-cart">${currentLang==='ar'?'أضف للسلة':'Add to Cart'}</button>
      <button class="btn-wish"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg></button>
    </div>
  </div>`;
}

// ===== MODAL =====
function openModal(p){
  currentProduct = p;
  const name = currentLang==='ar'?(p.name||''):(p.name_en||p.name||'');
  const desc = currentLang==='ar'?(p.description||''):(p.description_en||p.description||'');
  document.getElementById('modalImg').src = p.image_url||'';
  document.getElementById('modalImg').style.display = p.image_url?'block':'none';
  document.getElementById('modalName').textContent = name;
  document.getElementById('modalDesc').textContent = desc;
  document.getElementById('modalPrice').textContent = `${p.price} ${p.currency||'MAD'}`;
  document.getElementById('modalOld').textContent = p.old_price?`${p.old_price} ${p.currency||'MAD'}`:'';
  document.getElementById('modalBadge').textContent = p.category||'';
  document.getElementById('modalOverlay').classList.add('open');
}
document.getElementById('modalClose').onclick=()=>document.getElementById('modalOverlay').classList.remove('open');
document.getElementById('modalOverlay').onclick=e=>{ if(e.target===e.currentTarget) e.currentTarget.classList.remove('open'); };
document.getElementById('modalAddCart').onclick=()=>{ addToCart(currentProduct); document.getElementById('modalOverlay').classList.remove('open'); };

// ===== CART =====
function addToCart(p){
  const existing = cart.find(i=>i.id===p.id);
  if(existing) existing.qty++;
  else cart.push({...p, qty:1});
  saveCart(); updateCartUI();
  showToast(currentLang==='ar'?'✓ أضيف للسلة':'✓ Added to cart');
}
function removeFromCart(id){ cart=cart.filter(i=>i.id!==id); saveCart(); updateCartUI(); }
function changeQty(id,d){ const i=cart.find(x=>x.id===id); if(i){i.qty+=d; if(i.qty<1) removeFromCart(id);} saveCart(); updateCartUI(); }
function saveCart(){ localStorage.setItem('nj_cart',JSON.stringify(cart)); }
function updateCartUI(){
  const count = cart.reduce((a,i)=>a+i.qty,0);
  document.getElementById('cartCount').textContent = count;
  const total = cart.reduce((a,i)=>a+(i.price*i.qty),0);
  document.getElementById('cartTotal').textContent = `${total.toFixed(2)} ${cart[0]?.currency||'MAD'}`;
  const itemsEl = document.getElementById('cartItems');
  if(!cart.length){ itemsEl.innerHTML=`<div style="text-align:center;padding:40px;color:var(--text2)">${currentLang==='ar'?'السلة فارغة':'Cart is empty'}</div>`; return; }
  itemsEl.innerHTML = cart.map(i=>`
    <div class="cart-item">
      <img src="${i.image_url||''}" alt="${i.name||''}" onerror="this.style.display='none'"/>
      <div class="cart-item-info">
        <div class="cart-item-name">${currentLang==='ar'?(i.name||''):(i.name_en||i.name||'')}</div>
        <div class="cart-item-price">${(i.price*i.qty).toFixed(2)} ${i.currency||'MAD'}</div>
        <div class="cart-item-qty">
          <button class="qty-btn" onclick="changeQty('${i.id}',-1)">−</button>
          <span>${i.qty}</span>
          <button class="qty-btn" onclick="changeQty('${i.id}',1)">+</button>
        </div>
      </div>
    </div>`).join('');
}
document.getElementById('cartIcon').onclick=()=>document.getElementById('cartDrawer').classList.add('open');
document.getElementById('cartClose').onclick=()=>document.getElementById('cartDrawer').classList.remove('open');
document.getElementById('waCheckout').onclick=()=>{
  if(!cart.length) return;
  const lines = cart.map(i=>`- ${i.name||''} x${i.qty} = ${(i.price*i.qty).toFixed(2)} ${i.currency||'MAD'}`).join('\n');
  const total = cart.reduce((a,i)=>a+(i.price*i.qty),0);
  const msg = encodeURIComponent(`طلب جديد:\n${lines}\nالمجموع: ${total.toFixed(2)} ${cart[0]?.currency||'MAD'}`);
  window.open(`https://wa.me/${WA_NUMBER}?text=${msg}`,'_blank');
};

// ===== WISH =====
function toggleWish(btn){ btn.classList.toggle('liked'); }

// ===== TOAST =====
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

// ===== SEARCH =====
document.getElementById('searchInput').addEventListener('input',e=>renderProducts(e.target.value.toLowerCase()));

// ===== SCROLL =====
function scrollToProducts(){ document.getElementById('products').scrollIntoView({behavior:'smooth'}); }

// ===== THEME =====
const themeMap = { gold:'gold', emerald:'emerald', ocean:'ocean', rose:'rose', slate:'slate' };
document.getElementById('themeToggle').onclick=(e)=>{ e.stopPropagation(); document.getElementById('themePalette').classList.toggle('open'); };
document.querySelectorAll('.theme-dot').forEach(dot=>{
  dot.onclick=()=>{
    const t = dot.dataset.t;
    document.body.dataset.theme = t==='gold'?'gold':t;
    if(t==='gold') document.body.removeAttribute('data-theme');
    else document.body.setAttribute('data-theme',t);
    document.querySelectorAll('.theme-dot').forEach(d=>d.classList.remove('active'));
    dot.classList.add('active');
    document.getElementById('themePalette').classList.remove('open');
    localStorage.setItem('nj_theme',t);
  };
});
document.addEventListener('click',()=>document.getElementById('themePalette').classList.remove('open'));

// ===== LANG =====
function applyLang(){
  document.documentElement.lang = currentLang;
  document.documentElement.dir = currentLang==='ar'?'rtl':'ltr';
  document.querySelectorAll('[data-ar]').forEach(el=>{
    const val = el.dataset[currentLang];
    if(val) el.innerHTML = val;
  });
  document.querySelectorAll('[data-ar-placeholder]').forEach(el=>{
    el.placeholder = el.dataset[currentLang+'Placeholder']||'';
  });
  document.getElementById('langBtn').textContent = currentLang==='ar'?'EN':'ع';
  renderCategories();
  renderProducts(document.getElementById('searchInput').value.toLowerCase());
}
document.getElementById('langBtn').onclick=()=>{ currentLang=currentLang==='ar'?'en':'ar'; localStorage.setItem('nj_lang',currentLang); applyLang(); };

// ===== RESTORE PREFS =====
const savedTheme = localStorage.getItem('nj_theme');
if(savedTheme && savedTheme!=='gold'){
  document.body.setAttribute('data-theme',savedTheme);
  document.querySelectorAll('.theme-dot').forEach(d=>{ d.classList.remove('active'); if(d.dataset.t===savedTheme) d.classList.add('active'); });
}
currentLang = localStorage.getItem('nj_lang')||'ar';
applyLang();
updateCartUI();
loadProducts();
</script>
</body>
</html>
